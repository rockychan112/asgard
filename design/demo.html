<!--
  Asgard demo · the prism hero (v4 · news pool + shuffle).
  A beam of news strikes the prism and bursts into per-identity stakes+actions;
  dark beams are honest SKIPs. Cards render from an inline JSON pool of REAL
  pipeline output (design/demo_data.json, regenerated by design/gen_demo_data.py —
  after regenerating, re-inject: python design/inject_demo.py).
-->
<style>
  :root {
    --bg: #06070c;
    --panel: #10131c;
    --panel-2: #0c0f17;
    --line: #232a3a;
    --fg: #eef1f8;
    --muted: #9aa3b7;
    --faint: #5c6478;
    --white: #f2f5fc;
    --amber: #e6b450;
    --teal: #43c6b8;
    --indigo: #9a86f0;
    --rose: #e08bb0;
    --grey: #5a6172;
    --display: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    --body: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", "Cascadia Code", Menlo, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; color: var(--fg); font-family: var(--body); line-height: 1.65;
    -webkit-font-smoothing: antialiased;
    background:
      radial-gradient(900px 500px at 50% 16%, #141a2b 0%, rgba(20,26,43,0) 62%),
      radial-gradient(1200px 720px at 50% 128%, #0e1220 0%, rgba(14,18,32,0) 55%),
      var(--bg);
  }
  .wrap { max-width: 1040px; margin: 0 auto; padding: 5.5rem 1.5rem 5.5rem; }

  /* ---- brand hero ---- */
  .brand { text-align: center; }
  .name {
    font-family: var(--display); font-weight: 700; letter-spacing: -.02em;
    font-size: clamp(3rem, 9vw, 5.5rem); line-height: 1; margin: 0;
    color: var(--white);
    text-shadow: 0 0 46px rgba(154,134,240,.30), 0 0 100px rgba(67,198,184,.12);
  }
  .name .dot { color: var(--indigo); }
  .tagline {
    font-family: var(--display); font-weight: 600; letter-spacing: .01em;
    font-size: clamp(1.1rem, 3vw, 1.45rem); color: var(--fg); margin: 1.35rem 0 0;
  }
  .tagline .q { color: var(--teal); }
  .lead {
    color: var(--muted); font-size: 1.02rem; line-height: 1.75;
    max-width: 33rem; margin: 1.5rem auto 0; text-wrap: balance;
  }
  .lead b { color: var(--fg); font-weight: 600; }

  /* ---- the light apparatus: source -> prism -> cards ---- */
  .apparatus { margin-top: 5rem; }

  .source { max-width: 34rem; margin: 0 auto; text-align: center; }
  .source .tag { font-family: var(--mono); font-size: .68rem; letter-spacing: .16em; text-transform: uppercase; color: var(--faint); }
  .source .head { font-family: var(--display); font-weight: 600; font-size: 1.06rem; color: var(--white); margin: .7rem 0 .5rem; letter-spacing: -.01em; }
  .source .src { font-family: var(--mono); font-size: .68rem; color: var(--faint); }
  .shuffle {
    margin-top: .95rem; font-family: var(--mono); font-size: .72rem; letter-spacing: .08em;
    color: var(--fg); background: transparent; border: 1px solid var(--line); border-radius: 999px;
    padding: .38rem 1rem; cursor: pointer; transition: border-color .15s ease, box-shadow .15s ease;
  }
  .shuffle:hover { border-color: var(--indigo); box-shadow: 0 0 14px rgba(154,134,240,.25); }
  .shuffle .n { color: var(--faint); }

  .prismwrap { position: relative; width: 100%; margin: .4rem 0 0; }
  .prismwrap svg { display: block; width: 100%; height: auto; }

  /* ---- refraction cards ---- */
  .cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.15rem; margin-top: .4rem; }
  .card {
    position: relative; background: linear-gradient(180deg, var(--panel), var(--panel-2));
    border: 1px solid var(--line); border-radius: 14px; padding: 1.5rem 1.35rem 1.6rem;
    display: flex; flex-direction: column;
    box-shadow: 0 -16px 38px -24px var(--hue), inset 0 1px 0 rgba(255,255,255,.03);
    transition: transform .18s ease, box-shadow .2s ease;
  }
  .card::before {
    content: ""; position: absolute; left: 1.35rem; right: 1.35rem; top: -1px; height: 2px; border-radius: 2px;
    background: var(--hue); box-shadow: 0 0 16px var(--hue); opacity: .9;
  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 20px 44px -22px var(--hue), 0 0 0 1px color-mix(in srgb, var(--hue) 40%, transparent); }
  .who { font-weight: 600; font-size: .9rem; line-height: 1.4; letter-spacing: -.01em; min-height: 2.52em; display: flex; align-items: flex-start; }
  .badge {
    align-self: flex-start; margin-top: .9rem; font-family: var(--mono); font-size: .64rem;
    letter-spacing: .1em; text-transform: uppercase; padding: .2rem .55rem; border-radius: 999px;
    color: var(--hue); border: 1px solid color-mix(in srgb, var(--hue) 55%, transparent);
    background: color-mix(in srgb, var(--hue) 12%, transparent);
  }
  .stake { font-size: .84rem; line-height: 1.72; color: var(--muted); margin: 1.15rem 0 0; }
  .do { font-family: var(--mono); font-size: .62rem; letter-spacing: .12em; text-transform: uppercase; color: var(--faint); margin-top: 1.35rem; }
  .card ul { list-style: none; margin: .6rem 0 0; padding: 0; display: grid; gap: .6rem; }
  .card li { font-size: .82rem; line-height: 1.6; color: var(--fg); padding-left: 1.15rem; position: relative; }
  .card li::before { content: "→"; position: absolute; left: 0; top: 0; color: var(--hue); font-family: var(--mono); }
  .cite { margin-top: auto; padding-top: 1.4rem; display: flex; flex-wrap: wrap; gap: .4rem; }
  .chip { font-family: var(--mono); font-size: .63rem; color: var(--fg); padding: .16rem .48rem; border-radius: 6px; border: 1px solid var(--line); background: var(--bg); }
  .chip b { color: var(--hue); font-weight: 600; }

  .card.skip { background: #0a0c12; border-style: dashed; box-shadow: none; }
  .card.skip::before { opacity: .22; box-shadow: none; }
  .card.skip .who { color: var(--faint); }
  .card.skip .badge { color: var(--faint); border-color: var(--line); background: transparent; }
  .card.skip .stake { color: var(--faint); }

  /* ---- motion: the beam strikes, light bursts, cards ignite ---- */
  @media (prefers-reduced-motion: no-preference) {
    #beamIn { transform-origin: 450px 0; transform: scaleY(0); animation: shootin .5s ease forwards .15s; }
    .ray { opacity: 0; transform-box: fill-box; transform-origin: top center; transform: scaleY(.2); animation: burst .7s cubic-bezier(.16,1,.3,1) forwards .6s; }
    #prismShape { opacity: 0; animation: fadein .4s ease forwards .55s; }
    .card { opacity: 0; transform: translateY(14px); animation: rise .55s cubic-bezier(.16,1,.3,1) forwards; }
    .card:nth-child(1){ animation-delay: .2s; } .card:nth-child(2){ animation-delay: .31s; }
    .card:nth-child(3){ animation-delay: .42s; } .card:nth-child(4){ animation-delay: .53s; }
    @keyframes shootin { to { transform: scaleY(1); } }
    @keyframes burst { to { opacity: 1; transform: scaleY(1); } }
    @keyframes fadein { to { opacity: 1; } }
    @keyframes rise { to { opacity: 1; transform: none; } }
  }

  @media (max-width: 760px) { .cards { grid-template-columns: repeat(2, 1fr); } .apparatus { margin-top: 3.5rem; } }
  @media (max-width: 440px) { .cards { grid-template-columns: 1fr; } .who { min-height: 0; } }
</style>

<div class="wrap">
  <div class="brand">
    <h1 class="name">Asgard<span class="dot">.</span></h1>
    <p class="tagline">你的私人<span class="q">「情报」</span>官</p>
    <p class="lead">同一条资讯，只告诉<b>「你」</b>跟你有关的<b>利害</b>和<b>能做的事</b>；无关，就直说无关。</p>
  </div>

  <div class="apparatus">
    <div class="source">
      <div class="tag">同一条新闻 · 人人拿到同一份中立事实</div>
      <div class="head" id="newsHead"></div>
      <div class="src" id="newsSrc"></div>
      <button class="shuffle" id="shuffleBtn" type="button">换一条新闻 ↺ <span class="n" id="poolN"></span></button>
    </div>

    <div class="prismwrap" aria-hidden="true">
      <svg viewBox="0 0 900 250" preserveAspectRatio="xMidYMax meet" role="presentation">
        <defs>
          <linearGradient id="gWhite" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#f2f5fc" stop-opacity=".9"/>
            <stop offset="1" stop-color="#cfd8ff" stop-opacity=".5"/>
          </linearGradient>
          <linearGradient id="gAmber" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#e6b450" stop-opacity=".62"/><stop offset="1" stop-color="#e6b450" stop-opacity="0"/></linearGradient>
          <linearGradient id="gTeal" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#43c6b8" stop-opacity=".62"/><stop offset="1" stop-color="#43c6b8" stop-opacity="0"/></linearGradient>
          <linearGradient id="gIndigo" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#9a86f0" stop-opacity=".62"/><stop offset="1" stop-color="#9a86f0" stop-opacity="0"/></linearGradient>
          <linearGradient id="gRose" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#e08bb0" stop-opacity=".62"/><stop offset="1" stop-color="#e08bb0" stop-opacity="0"/></linearGradient>
          <linearGradient id="gGrey" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#5a6172" stop-opacity=".22"/><stop offset="1" stop-color="#5a6172" stop-opacity="0"/></linearGradient>
          <linearGradient id="gGlass" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#e9ecff" stop-opacity=".22"/>
            <stop offset=".5" stop-color="#9a86f0" stop-opacity=".14"/>
            <stop offset="1" stop-color="#43c6b8" stop-opacity=".16"/>
          </linearGradient>
          <filter id="soft" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="7"/></filter>
          <filter id="glow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="3.2"/></filter>
        </defs>

        <g style="mix-blend-mode: screen" filter="url(#soft)">
          <polygon class="ray" id="ray0" points="443,96 457,96 250,250 96,250"/>
          <polygon class="ray" id="ray1" points="445,96 457,96 430,250 300,250"/>
          <polygon class="ray" id="ray2" points="443,96 455,96 600,250 470,250"/>
          <polygon class="ray" id="ray3" points="449,96 457,96 806,250 700,250"/>
        </g>

        <rect id="beamIn" x="446" y="0" width="8" height="98" fill="url(#gWhite)" filter="url(#glow)"/>

        <g id="prismShape">
          <polygon points="450,44 492,98 408,98" fill="url(#gGlass)" stroke="#cdd6ff" stroke-opacity=".55" stroke-width="1.2" filter="url(#glow)"/>
          <polygon points="450,44 492,98 408,98" fill="none" stroke="#f2f5fc" stroke-opacity=".7" stroke-width="1"/>
          <line x1="450" y1="52" x2="470" y2="92" stroke="#ffffff" stroke-opacity=".35" stroke-width="1"/>
        </g>
      </svg>
    </div>

    <div class="cards" id="cards"></div>
  </div>
</div>

<script type="application/json" id="pool">__POOL_JSON__</script>
<script>
(function () {
  var POOL = JSON.parse(document.getElementById("pool").textContent).items;
  var HUES = ["--amber", "--teal", "--indigo", "--rose"];
  var GRADS = ["url(#gAmber)", "url(#gTeal)", "url(#gIndigo)", "url(#gRose)"];
  var BADGE = { high: "High", medium: "Medium", low: "Low", skip: "跳过" };
  var cur = 0;

  function cut(s, n) { s = s || ""; return s.length > n ? s.slice(0, n).replace(/[，。；、：,.;: ]+$/, "") + "…" : s; }

  function pids(facts) {
    var seen = {}, out = [];
    (facts || []).forEach(function (f) {
      var id = String(f).split(":")[0].trim();
      if (/^P-/.test(id) && !seen[id]) { seen[id] = 1; out.push(id); }
    });
    return out.slice(0, 3);
  }

  function esc(s) { var d = document.createElement("i"); d.textContent = s == null ? "" : s; return d.innerHTML; }

  function card(c, i) {
    var fired = c.relevance !== "skip";
    var hue = "var(" + HUES[i] + ")";
    var el = document.createElement("article");
    el.className = "card" + (fired ? "" : " skip");
    el.style.setProperty("--hue", fired ? hue : "var(--grey)");
    var h = '<div class="who">' + esc(c.label) + "</div>" +
      '<span class="badge">' + esc(BADGE[c.relevance] || c.relevance) + "</span>";
    if (fired) {
      h += '<p class="stake">' + esc(cut(c.stakes || c.why_you, 118)) + "</p>";
      var acts = (c.actions || []).slice(0, 2);
      if (acts.length) {
        h += '<div class="do">该做什么</div><ul>' +
          acts.map(function (a) { return "<li>" + esc(cut(a, 64)) + "</li>"; }).join("") + "</ul>";
      }
      var ids = pids(c.used_facts);
      if (ids.length) {
        h += '<div class="cite">' + ids.map(function (id) {
          return '<span class="chip">依据 <b>' + esc(id) + "</b></span>";
        }).join("") + "</div>";
      }
    } else {
      h += '<p class="stake">' + esc(cut(c.skip_reason, 118)) + "</p>";
    }
    el.innerHTML = h;
    return el;
  }

  function render(idx) {
    cur = idx;
    var item = POOL[idx];
    document.getElementById("newsHead").textContent = item.headline;
    document.getElementById("newsSrc").textContent = item.source + " · " + item.date;
    document.getElementById("poolN").textContent = (idx + 1) + "/" + POOL.length;
    var box = document.getElementById("cards");
    box.innerHTML = "";
    item.cards.forEach(function (c, i) {
      box.appendChild(card(c, i));
      var ray = document.getElementById("ray" + i);
      if (ray) ray.setAttribute("fill", c.relevance !== "skip" ? GRADS[i] : "url(#gGrey)");
    });
  }

  document.getElementById("shuffleBtn").addEventListener("click", function () {
    if (POOL.length < 2) return;
    var next = cur;
    while (next === cur) next = Math.floor(Math.random() * POOL.length);
    render(next);
  });

  render(0);
})();
</script>
