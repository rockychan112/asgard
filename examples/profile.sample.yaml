slug: sample-indie-dev
label: 独立开发者 · 订阅制 iOS 应用
facts:
  P-role: 独立开发者，一个人开发和运营一款订阅制 iOS 效率应用
  P-revenue: 收入全部来自 App Store 订阅，以美元结算，占个人收入九成以上
  P-market: 用户主要在美国和欧洲，中文市场占比很小
  P-stack: 主力技术栈是 Swift/SwiftUI，重度使用 AI 编程工具提效
  P-goal: 今年目标是把月订阅收入翻倍，并控制获客成本
  P-cares: App Store 政策与佣金变化、订阅经济趋势、AI 编程工具、独立开发者出海
  P-ignores: 加密货币、硬件供应链、与个人开发和订阅业务无关的企业级新闻
